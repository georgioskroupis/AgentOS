<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgentOS Monitor</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --text: #1f2328;
        --muted: #667085;
        --line: #d7dce2;
        --accent: #246b5a;
        --wait: #8a5a13;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1, h2, p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        font-weight: 650;
      }

      h2 {
        font-size: 14px;
        font-weight: 650;
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        margin-top: 8px;
        padding: 0 9px;
        border: 1px solid color-mix(in srgb, var(--wait) 30%, var(--line));
        border-radius: 999px;
        color: var(--wait);
        background: #fff7e8;
        font-size: 12px;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 18px 0 28px;
        display: grid;
        grid-template-columns: repeat(7, minmax(120px, 1fr));
        gap: 12px;
      }

      section {
        min-height: 132px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        display: grid;
        align-content: space-between;
        gap: 18px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
      }

      .empty {
        min-height: 8px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent) 14%, transparent);
      }

      @media (max-width: 980px) {
        main {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 540px) {
        header {
          padding: 16px;
        }

        main {
          width: calc(100vw - 24px);
          grid-template-columns: 1fr;
          padding-top: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>AgentOS Monitor</h1>
        <p class="status">Lean monitor shell</p>
      </header>
      <main aria-label="Monitor sections">
        <section>
          <h2>Run Header</h2>
          <div class="empty"></div>
          <p class="label">Idle</p>
        </section>
        <section>
          <h2>Tiny Summary</h2>
          <div class="empty"></div>
          <p class="label">Idle</p>
        </section>
        <section>
          <h2>Current Activity</h2>
          <div class="empty"></div>
          <p class="label">Idle</p>
        </section>
        <section>
          <h2>Nested Timing Table</h2>
          <div class="empty"></div>
          <p class="label">Idle</p>
        </section>
        <section>
          <h2>Top Time Sinks</h2>
          <div class="empty"></div>
          <p class="label">Idle</p>
        </section>
        <section>
          <h2>Human Action</h2>
          <div class="empty"></div>
          <p class="label">Not needed</p>
        </section>
        <section>
          <h2>Links</h2>
          <div class="empty"></div>
          <p class="label">None</p>
        </section>
      </main>
    </div>
  </body>
</html>
